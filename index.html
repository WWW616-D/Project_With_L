<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>很大的 Hello - 震撼视觉效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免选中文字影响美观，但不影响功能 */
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #03050b);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Poppins', 'Impact', 'Arial Black', 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            position: relative;
            cursor: default;
        }

        /* 主容器 - 完美居中，响应式超大尺寸 */
        .hero {
            text-align: center;
            padding: 1.5rem;
            width: 100%;
            transition: all 0.2s ease;
        }

        /* 超级巨大的 HELLO 主体 */
        .giant-hello {
            font-size: clamp(5rem, 18vw, 28rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(0,255,255,0.6),
                         0 0 18px rgba(0,150,255,0.5),
                         0 0 35px rgba(0,100,255,0.4),
                         8px 12px 20px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #FFF9C4, #FFE57F, #FFB347, #FF6B6B, #C792FF, #6D8CFF);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientFlow 8s ease infinite, subtleGlow 3s infinite alternate;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: inline-block;
            white-space: nowrap;
        }

        /* 响应式处理：如果屏幕太窄，允许换行并略微调整大小，但保持很大 */
        @media (max-width: 680px) {
            .giant-hello {
                white-space: normal;
                word-break: keep-all;
                font-size: clamp(4rem, 15vw, 12rem);
                letter-spacing: 0.02em;
            }
        }

        /* 渐变流动动画 */
        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* 柔和光晕脉动 */
        @keyframes subtleGlow {
            0% {
                filter: drop-shadow(0 0 5px rgba(255,200,100,0.3)) drop-shadow(0 0 12px rgba(0,180,255,0.2));
                text-shadow: 0 0 8px rgba(0,255,255,0.4), 0 0 18px rgba(0,150,255,0.3);
            }
            100% {
                filter: drop-shadow(0 0 18px rgba(255,100,150,0.5)) drop-shadow(0 0 28px rgba(100,150,255,0.5));
                text-shadow: 0 0 15px rgba(0,255,200,0.7), 0 0 30px rgba(70,130,255,0.6);
            }
        }

        /* 增加悬停互动效果 —— 稍微放大并改变光影，更生动 */
        .giant-hello:hover {
            transform: scale(1.03);
            animation: gradientFlow 5s ease infinite, intenseGlow 0.8s infinite alternate;
            cursor: pointer;
        }

        @keyframes intenseGlow {
            from {
                filter: drop-shadow(0 0 10px #ff66cc) drop-shadow(0 0 15px #ffcc33);
                text-shadow: 0 0 12px cyan, 0 0 25px #ff44aa;
            }
            to {
                filter: drop-shadow(0 0 25px #ff4488) drop-shadow(0 0 35px #ffcc44);
                text-shadow: 0 0 20px #ffaa55, 0 0 40px #ff66cc;
            }
        }

        /* 装饰性小元素: 底层光晕大圆 */
        .glow-orb {
            position: fixed;
            width: 60vw;
            height: 60vw;
            max-width: 800px;
            max-height: 800px;
            background: radial-gradient(circle, rgba(100,80,255,0.25), rgba(0,0,0,0) 70%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(60px);
            pointer-events: none;
            animation: orbPulse 6s infinite alternate;
        }

        @keyframes orbPulse {
            0% {
                opacity: 0.4;
                width: 55vw;
                height: 55vw;
                background: radial-gradient(circle, rgba(120,100,255,0.3), rgba(0,0,0,0) 75%);
            }
            100% {
                opacity: 0.9;
                width: 70vw;
                height: 70vw;
                background: radial-gradient(circle, rgba(255,120,200,0.35), rgba(0,0,0,0) 80%);
            }
        }

        /* 背景动态粒子 + 星星点缀 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: twinkle 4s infinite alternate;
            box-shadow: 0 0 8px rgba(255,255,200,0.8);
        }

        @keyframes twinkle {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* 额外的小点缀：底部浮动文字，优雅又不抢镜 */
        .sub-message {
            margin-top: 2rem;
            font-size: 1.3rem;
            letter-spacing: 0.3rem;
            font-weight: 400;
            color: rgba(255, 255, 245, 0.8);
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-family: 'Segoe UI', monospace;
            border: 1px solid rgba(255,255,200,0.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .sub-message:hover {
            background: rgba(20, 30, 70, 0.6);
            border-color: rgba(255,200,100,0.7);
            letter-spacing: 0.5rem;
            color: white;
        }

        /* 可选的加载了一个很酷的闪烁动画, 并且页面完全自适应中心 */
        @media (prefers-reduced-motion: reduce) {
            .giant-hello {
                animation: none;
                text-shadow: 0 0 12px cyan;
            }
            .glow-orb, .star {
                animation: none;
            }
        }

        /* 增加立体感的浮动阴影 */
        .container-shadow {
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.4));
        }

        /* 让 hello 更霸气，加一个边框光效伪元素 */
        .giant-hello-wrapper {
            position: relative;
            display: inline-block;
        }

        /* 震撼入场动画: 放大弹出 */
        .giant-hello {
            animation: gradientFlow 8s ease infinite, subtleGlow 3s infinite alternate, popIn 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.2) rotate(-8deg);
                filter: blur(12px);
            }
            40% {
                opacity: 1;
                transform: scale(1.05) rotate(1deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
                filter: blur(0);
            }
        }
    </style>
</head>
<body>
    <!-- 星尘背景动态效果 -->
    <div class="stars" id="starfield"></div>
    <div class="glow-orb"></div>

    <div class="hero">
        <div class="giant-hello-wrapper">
            <!-- 核心内容：非常巨大的 HELLO -->
            <div class="giant-hello" id="mainHello">
                HELLO
            </div>
        </div>
        <div style="margin-top: 1.8rem;">
            <div class="sub-message">
                ! 这是一个很大的问候 !
            </div>
        </div>
        <!-- 增加非常微妙的辅助提示，让页面更加饱满 -->
        <div style="margin-top: 2.5rem; font-size: 0.9rem; opacity: 0.6; color: #ccd6f6; font-family: monospace; letter-spacing: 1px;">
            ! 巨大的视效 | 渐变流动 | 脉冲光晕 !
        </div>
    </div>

    <script>
        // 生成随机星星，让背景丰富但不会干扰前景，突出巨大的Hello
        function createStars() {
            const starsContainer = document.getElementById('starfield');
            if (!starsContainer) return;
            const starCount = window.innerWidth < 768 ? 120 : 220;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 4 + 1.5; // 1.5px ~ 5.5px
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                // 随机动画延迟和时长，制造闪烁层次感
                const duration = Math.random() * 3 + 2; // 2~5s
                const delay = Math.random() * 5;
                star.style.animation = `twinkle ${duration}s infinite alternate`;
                star.style.animationDelay = `${delay}s`;
                star.style.opacity = Math.random() * 0.6 + 0.2;
                star.style.background = `rgba(255, 240, 200, ${Math.random() * 0.7 + 0.3})`;
                star.style.boxShadow = `0 0 ${Math.random() * 6 + 2}px rgba(255,255,180,0.6)`;
                starsContainer.appendChild(star);
            }
        }

        // 让背景光晕跟随鼠标轻微移动，增添高级互动感 (不影响主体稳固)
        function addMagneticGlow() {
            const glowOrb = document.querySelector('.glow-orb');
            if (!glowOrb) return;
            document.addEventListener('mousemove', (e) => {
                // 轻柔跟随，百分比偏移量很小，不影响阅读体验但增加趣味
                const x = (e.clientX / window.innerWidth) * 10;
                const y = (e.clientY / window.innerHeight) * 10;
                if (glowOrb) {
                    glowOrb.style.transform = `translate(calc(-50% + ${x * 0.3}px), calc(-50% + ${y * 0.3}px))`;
                }
            });
        }

        // 添加一个更有趣的控制台彩蛋彩蛋
        function consoleGreeting() {
            console.log("%c? 超大 HELLO ?", "color: #ffaa44; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 0px #5522aa;");
            console.log("%c这个页面为你呈现了一个大到震撼的 HELLO，渐变+脉冲效果，祝你开心每一天！", "color: #88ddff; font-size: 14px;");
        }

        // 窗口自适应重新生成星星(避免过多重复，简单保留原有效果，但以防尺寸大变重新生成更好)
        let starTimeout = null;
        function regenerateStarsOnResize() {
            const isMobile = window.innerWidth < 700;
            const starsContainer = document.getElementById('starfield');
            if (!starsContainer) return;
            // 防止短时间多次清空导致闪动，去抖
            if (starTimeout) clearTimeout(starTimeout);
            starTimeout = setTimeout(() => {
                if (starsContainer) {
                    starsContainer.innerHTML = '';
                    createStars();
                }
            }, 300);
        }

        // 增加hello点击时的惊喜反馈: 产生一个飘浮的小特效 + 轻微的震动波纹（友好且有趣）
        function addHelloEffects() {
            const helloEl = document.getElementById('mainHello');
            if (!helloEl) return;
            helloEl.addEventListener('click', (e) => {
                // 波纹样式动画 (涟漪效果)
                const ripple = document.createElement('div');
                ripple.style.position = 'fixed';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(255, 255, 255, 0.6)';
                ripple.style.pointerEvents = 'none';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.left = e.clientX + 'px';
                ripple.style.top = e.clientY + 'px';
                ripple.style.transform = 'translate(-50%, -50%) scale(0)';
                ripple.style.zIndex = '9999';
                ripple.style.opacity = '0.8';
                ripple.style.animation = 'rippleAnim 0.6s ease-out forwards';
                document.body.appendChild(ripple);
                setTimeout(() => ripple.remove(), 700);

                // 临时让hello弹跳一下
                helloEl.style.transform = 'scale(1.08)';
                setTimeout(() => {
                    helloEl.style.transform = '';
                }, 200);
                // 控制台友好输出
                console.log("? 你点击了巨大的 HELLO! ?");
            });
        }

        // 注入ripple关键帧动画
        function addRippleStyle() {
            if (!document.querySelector('#rippleStyle')) {
                const styleSheet = document.createElement('style');
                styleSheet.id = 'rippleStyle';
                styleSheet.textContent = `
                    @keyframes rippleAnim {
                        0% {
                            transform: translate(-50%, -50%) scale(0);
                            opacity: 0.7;
                            background-color: rgba(255, 220, 100, 0.8);
                        }
                        100% {
                            transform: translate(-50%, -50%) scale(25);
                            opacity: 0;
                            background-color: rgba(255, 100, 150, 0);
                        }
                    }
                `;
                document.head.appendChild(styleSheet);
            }
        }

        // 增加额外悬浮提示: 提示可单击
        function addHoverHint() {
            const hello = document.getElementById('mainHello');
            if (hello && !hello.hasAttribute('data-hint')) {
                hello.setAttribute('data-hint', 'true');
                hello.style.cursor = 'pointer';
                // 可选加title但会影响美观，省略，使用伪类通过右下角小工具提示，通过tooltip轻提示展示
                // 使用伪元素不合算，加一个轻量浮动提示
                let tooltip = document.createElement('div');
                tooltip.innerText = '? 点击有惊喜 ?';
                tooltip.style.position = 'fixed';
                tooltip.style.bottom = '20px';
                tooltip.style.right = '20px';
                tooltip.style.backgroundColor = 'rgba(0,0,0,0.6)';
                tooltip.style.backdropFilter = 'blur(8px)';
                tooltip.style.color = '#FFE484';
                tooltip.style.padding = '6px 14px';
                tooltip.style.borderRadius = '40px';
                tooltip.style.fontSize = '13px';
                tooltip.style.fontFamily = 'monospace';
                tooltip.style.letterSpacing = '1px';
                tooltip.style.zIndex = '1000';
                tooltip.style.pointerEvents = 'none';
                tooltip.style.opacity = '0.7';
                tooltip.style.transition = 'opacity 0.3s';
                tooltip.style.border = '1px solid rgba(255,200,100,0.5)';
                document.body.appendChild(tooltip);
                setTimeout(() => {
                    if (tooltip) tooltip.style.opacity = '0.2';
                    setTimeout(() => {
                        if (tooltip) tooltip.remove();
                    }, 4000);
                }, 2800);
            }
        }

        // 检测视口变化动态调整一些样式细节
        function handleOrientation() {
            window.addEventListener('resize', () => {
                regenerateStarsOnResize();
                // 保证字体基准在极端宽高下依旧很大，无额外操作
                const hello = document.querySelector('.giant-hello');
                if (hello && window.innerWidth < 500) {
                    hello.style.whiteSpace = 'normal';
                } else if (hello) {
                    hello.style.whiteSpace = 'nowrap';
                    if (window.innerWidth < 680) {
                        hello.style.whiteSpace = 'normal';
                    } else {
                        hello.style.whiteSpace = 'nowrap';
                    }
                }
            });
        }

        // 优雅启动所有特效
        function init() {
            createStars();
            addMagneticGlow();
            consoleGreeting();
            addHelloEffects();
            addRippleStyle();
            handleOrientation();
            addHoverHint();
            // 检查whiteSpace初始状态
            const helloEl = document.querySelector('.giant-hello');
            if (helloEl && window.innerWidth < 680) {
                helloEl.style.whiteSpace = 'normal';
            }
        }

        // 等待页面完全加载后执行
        window.addEventListener('DOMContentLoaded', init);
    </script>

    <!-- 确保所有主流设备支持，使用最大视口适应 -->
    <style>
        /* 针对移动端优化手感，触摸友好 */
        .giant-hello {
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), filter 0.2s;
        }
        /* 增加额外霸气阴影边框效果 */
        @media (min-width: 1200px) {
            .giant-hello {
                letter-spacing: 0.08em;
            }
        }
        body {
            margin: 0;
            padding: 0;
        }
    </style>
</body>
</html>
