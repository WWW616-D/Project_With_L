<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>加法计算器</title>
</head>
<body>
    <h1>网页加法计算器</h1>
    
    <input type="number" id="num1" placeholder="第一个数字">
    +
    <input type="number" id="num2" placeholder="第二个数字">
    
    <button onclick="calculate()">计算</button>
    
    <p>结果：<span id="result">等待计算</span></p>

    <script>
        // 改成你的 PythonAnywhere 地址
        const BACKEND = 'https://WWW616.pythonanywhere.com';

        async function calculate() {
            // 获取用户输入
            const a = parseFloat(document.getElementById('num1').value);
            const b = parseFloat(document.getElementById('num2').value);
            
            // 检查输入是否有效
            if (isNaN(a) || isNaN(b)) {
                document.getElementById('result').textContent = '请输入有效数字';
                return;
            }
            
            // 显示"计算中..."
            document.getElementById('result').textContent = '计算中...';
            
            try {
                // 发送请求到 PythonAnywhere
                const response = await fetch(`${BACKEND}/api/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ a: a, b: b })
                });
                
                const data = await response.json();
                document.getElementById('result').textContent = data.result;
                
            } catch (error) {
                console.error('错误:', error);
                document.getElementById('result').textContent = '连接后端失败';
            }
        }
    </script>
</body>
</html>
